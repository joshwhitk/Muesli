name: validate

on:
  push:
  pull_request:

jobs:
  py-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python files
        run: |
          python -m py_compile \
            muesli.py \
            muesli_gui.py \
            muesli_hotkey.py \
            muesli_batch_transcribe.py \
            test_muesli.py
